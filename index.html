<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom Scan Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #000; --accent: #00FF41; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #reader { width: 100%; height: 55vh; background: #000; }
        .result-panel {
            height: 45vh; background: #111; border-top: 2px solid var(--accent);
            padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .designation { font-size: 1.5rem; font-weight: bold; color: #EEE; }
        .prix { font-size: 4rem; font-weight: 900; color: var(--accent); margin: 10px 0; }
        .scan-line {
            position: absolute; top: 27vh; left: 15%; width: 70%; height: 2px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 5;
            animation: scanAnim 2s infinite ease-in-out;
        }
        @keyframes scanAnim { 0%, 100% { transform: translateY(-50px); opacity: 0.2; } 50% { transform: translateY(50px); opacity: 1; } }
    </style>
</head>
<body>

    <div class="scan-line"></div>
    <div id="reader"></div>

    <div class="result-panel">
        <div id="res-nom" class="designation">PRÊT AU SCAN</div>
        <div class="prix"><span id="res-prix">0.00</span> DA</div>
        <div id="res-info" style="font-size:0.7rem; color:#444;">CAMÉRA ARRIÈRE FORCÉE</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let html5QrCode;

        fetch('produits.json').then(res => res.json()).then(data => { catalogue = data.produits; });

        function onScanSuccess(decodedText) {
            const p = catalogue.find(item => item.codebarre === decodedText);
            document.getElementById('audioBip').play().catch(()=>{});
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
            } else {
                document.getElementById('res-nom').innerText = "NON TROUVÉ";
                document.getElementById('res-prix').innerText = "---";
            }
        }

        async function startBackCamera() {
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                // 1. On récupère la liste des caméras disponibles
                const devices = await Html5Qrcode.getCameras();
                
                if (devices && devices.length) {
                    // 2. On cherche la caméra qui contient "back" ou "rear" dans son nom
                    let backCameraId = devices.find(device => 
                        device.label.toLowerCase().includes("back") || 
                        device.label.toLowerCase().includes("rear") ||
                        device.label.toLowerCase().includes("arrière")
                    )?.id;

                    // 3. Si on ne trouve pas par nom, on prend la dernière de la liste (souvent l'arrière)
                    if (!backCameraId) backCameraId = devices[devices.length - 1].id;

                    const config = { 
                        fps: 25, 
                        qrbox: { width: 300, height: 150 },
                        aspectRatio: 1.0
                    };

                    // 4. On lance la caméra spécifique
                    await html5QrCode.start(backCameraId, config, onScanSuccess);
                } else {
                    // Repli vers le mode automatique environment si la liste est vide
                    await html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: { width: 300, height: 150 } }, onScanSuccess);
                }
            } catch (err) {
                console.error("Erreur caméra : ", err);
                document.getElementById('res-info').innerText = "ERREUR CAMÉRA";
            }
        }

        window.addEventListener('load', startBackCamera);
    </script>
</body>
</html>
