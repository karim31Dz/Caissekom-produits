<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom - Scanner Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <style>
        :root { --accent: #00FF41; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Zone Caméra Vidéo */
        #interactive.viewport { width: 100%; height: 50vh; position: relative; overflow: hidden; }
        #interactive.viewport > video { width: 100%; height: 100%; object-fit: cover; }
        canvas.drawingBuffer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }

        .result-panel {
            height: 50vh; background: #111; border-top: 2px solid var(--accent);
            padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .prix { font-size: 4.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        
        .btn-switch {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background: rgba(0,0,0,0.7); border: 1px solid var(--accent); color: var(--accent);
            padding: 12px; border-radius: 50%; font-size: 1.2rem;
        }

        /* Ligne de visée */
        .laser {
            position: absolute; top: 25vh; left: 10%; width: 80%; height: 2px;
            background: var(--accent); box-shadow: 0 0 10px var(--accent); z-index: 5;
        }
    </style>
</head>
<body>

    <button class="btn-switch" onclick="location.reload()">🔄</button>
    <div class="laser"></div>
    <div id="interactive" class="viewport"></div>

    <div class="result-panel">
        <div id="res-nom" style="font-size:1.4rem; font-weight:bold;">SCANNEZ UN PRODUIT</div>
        <div class="prix"><span id="res-prix">0.00</span> DA</div>
        <div id="res-code" style="font-size:0.8rem; color:#555;">Moteur Quagga Engine Actif</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let dernierCode = "";
        let tempsDernierScan = 0;

        // 1. Chargement JSON
        fetch('produits.json').then(res => res.json()).then(data => { catalogue = data.produits; });

        // 2. Configuration Quagga (Optimisé pour EAN-13 de produits)
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#interactive'),
                constraints: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: "environment" // Force caméra arrière
                },
            },
            decoder: {
                readers: ["ean_reader", "code_128_reader", "ean_8_reader"] // Les formats de vos produits
            },
            locate: true // Aide à trouver le code-barre dans l'image
        }, function(err) {
            if (err) { console.log(err); return; }
            Quagga.start();
        });

        // 3. Détection du code
        Quagga.onDetected(function(result) {
            let code = result.codeResult.code;
            const maintenant = Date.now();

            if (code === dernierCode && (maintenant - tempsDernierScan) < 3000) return;

            dernierCode = code;
            tempsDernierScan = maintenant;

            // Bip et Vibration
            document.getElementById('audioBip').play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate(80);

            // Recherche
            const p = catalogue.find(item => item.codebarre === code);
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
            } else {
                document.getElementById('res-nom').innerText = "CODE : " + code;
                document.getElementById('res-prix').innerText = "---";
            }
        });
    </script>
</body>
</html>
