<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaisseKom - Consultation Prix</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #00E676; /* Vert CaisseKom */
            --text: #FFFFFF;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: sans-serif; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        #reader { 
            width: 100%; max-width: 400px; 
            border: 2px solid var(--accent); border-radius: 15px; overflow: hidden;
        }
        .container {
            width: 100%; max-width: 400px; margin-top: 20px;
        }
        .info-box {
            background: var(--card); padding: 20px; border-radius: 15px;
            border-left: 5px solid var(--accent); margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .valeur { font-size: 1.4rem; font-weight: bold; margin-top: 5px; display: block; }
        .prix-tag { font-size: 2.5rem; color: var(--accent); }
        
        button {
            background: var(--accent); border: none; padding: 15px;
            width: 100%; border-radius: 10px; font-weight: bold; font-size: 1rem;
            margin-top: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 20px;">Scanner <span style="color:var(--accent)">Le Produit</span></h2>

    <div id="reader"></div>

    <div class="container">
        <div class="info-box">
            <label>Produit</label>
            <span id="res-nom" class="valeur">En attente de scan...</span>
        </div>

        <div class="info-box">
            <label>Prix de Vente</label>
            <span id="res-prix" class="valeur prix-tag">0.00 DA</span>
        </div>

        <button onclick="location.reload()">NOUVEAU SCAN</button>
    </div>

    <script>
        let catalogue = [];

        // Charger les données depuis votre fichier JSON sur GitHub
        fetch('produits.json')
            .then(res => res.json())
            .then(data => { catalogue = data.produits; })
            .catch(err => console.error("Erreur chargement JSON"));

        function onScanSuccess(decodedText) {
            // Chercher le produit dans la liste
            const p = catalogue.find(item => item.codebarre === decodedText);
            
            if(p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix + " DA";
                // Vibration sur iPhone/Android si supporté
                if(navigator.vibrate) navigator.vibrate(100);
            } else {
                document.getElementById('res-nom').innerText = "Produit non trouvé (" + decodedText + ")";
                document.getElementById('res-prix').innerText = "-- DA";
            }
        }

        // Lancement du scanner
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
