<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom - Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #000; --accent: #00FF41; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        #reader { width: 100%; height: 55vh; background: #000; }
        
        .result-panel {
            height: 45vh; background: #111; border-top: 2px solid var(--accent);
            padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .prix { font-size: 4.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        
        /* Boutons de contrôle en haut à droite */
        .controls {
            position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 10px;
        }
        .btn-ctrl {
            background: rgba(0,0,0,0.7); border: 1px solid var(--accent); color: var(--accent);
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .scan-line {
            position: absolute; top: 27vh; left: 15%; width: 70%; height: 2px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 5;
            animation: scanAnim 2s infinite ease-in-out;
        }
        @keyframes scanAnim { 0%, 100% { transform: translateY(-50px); opacity: 0.2; } 50% { transform: translateY(50px); opacity: 1; } }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-ctrl" onclick="switchCamera()">🔄</button>
        <button class="btn-ctrl" id="btn-torch" onclick="toggleTorch()">🔦</button>
    </div>

    <div class="scan-line"></div>
    <div id="reader"></div>

    <div class="result-panel">
        <div id="res-nom" style="font-size:1.5rem; font-weight:bold;">PRÊT AU SCAN</div>
        <div class="prix"><span id="res-prix">0.00</span> DA</div>
        <div id="res-info" style="font-size:0.7rem; color:#444;">UTILISEZ 🔄 POUR CHANGER DE CAMÉRA</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let html5QrCode;
        let currentFacingMode = "environment"; // Par défaut Arrière
        let isTorchOn = false;

        fetch('produits.json').then(res => res.json()).then(data => { catalogue = data.produits; });

        function onScanSuccess(decodedText) {
            const p = catalogue.find(item => item.codebarre === decodedText);
            document.getElementById('audioBip').play().catch(()=>{});
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
            }
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function startScanner(faceMode) {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    launch(faceMode);
                }).catch(() => launch(faceMode));
            } else {
                launch(faceMode);
            }
        }

        function launch(faceMode) {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 25, qrbox: { width: 300, height: 150 } };
            
            html5QrCode.start({ facingMode: faceMode }, config, onScanSuccess)
            .catch(err => {
                // Si l'iPhone bloque le mode "environment", on essaie sans contrainte
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
            });
        }

        // Basculer entre Arrière (environment) et Avant (user)
        function switchCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            startScanner(currentFacingMode);
            document.getElementById('res-info').innerText = "MODE : " + currentFacingMode.toUpperCase();
        }

        function toggleTorch() {
            isTorchOn = !isTorchOn;
            html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] })
            .catch(() => alert("Torche non supportée sur cette caméra"));
        }

        // Démarrage initial
        window.addEventListener('load', () => startScanner("environment"));
    </script>
</body>
</html>
