<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom - iOS Ultra Scan</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #000; --accent: #00FF41; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; }
        #reader { width: 100%; height: 50vh; background: #000; }
        .result-panel {
            height: 50vh; background: #111; border-top: 2px solid var(--accent);
            padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center;
        }
        .prix { font-size: 4.5rem; font-weight: 900; color: var(--accent); margin: 5px 0; }
        .controls { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; gap: 10px; }
        .btn-ctrl {
            background: rgba(0,0,0,0.7); border: 1px solid var(--accent); color: var(--accent);
            width: 50px; height: 50px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
        }
        /* Ligne de guidage pour code-barres */
        .guide {
            position: absolute; top: 25vh; left: 10%; width: 80%; height: 2px;
            background: var(--accent); box-shadow: 0 0 15px var(--accent); z-index: 5;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-ctrl" onclick="switchCamera()">🔄</button>
        <button class="btn-ctrl" onclick="toggleTorch()">🔦</button>
    </div>

    <div class="guide"></div>
    <div id="reader"></div>

    <div class="result-panel">
        <div id="res-nom" style="font-size:1.4rem; font-weight:bold;">PRÊT (iOS OPTIMIZ)</div>
        <div class="prix"><span id="res-prix">0.00</span> DA</div>
        <div id="res-info" style="font-size:0.7rem; color:#666;">SCANNEZ BIEN HORIZONTALEMENT</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let html5QrCode;
        let currentFacingMode = "environment";
        let isTorchOn = false;

        fetch('produits.json').then(res => res.json()).then(data => { catalogue = data.produits; });

        function onScanSuccess(decodedText) {
            const p = catalogue.find(item => item.codebarre === decodedText);
            document.getElementById('audioBip').play().catch(()=>{});
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
            } else {
                document.getElementById('res-nom').innerText = "CODE: " + decodedText;
            }
            if(navigator.vibrate) navigator.vibrate(60);
        }

        async function launch(faceMode) {
            if (html5QrCode) { await html5QrCode.stop(); }
            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 30, 
                qrbox: { width: 320, height: 150 },
                aspectRatio: 1.0,
                // On force iOS à utiliser ses capacités natives de décodage
                experimentalFeatures: { useBarCodeDetectorIfSupported: true },
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13, 
                    Html5QrcodeSupportedFormats.CODE_128, 
                    Html5QrcodeSupportedFormats.QR_CODE 
                ]
            };

            // CONTRAINTES VIDÉO SPÉCIFIQUES POUR iPHONE
            const videoConstraints = {
                facingMode: faceMode,
                width: { min: 640, ideal: 1280, max: 1920 },
                height: { min: 480, ideal: 720, max: 1080 },
                focusMode: "continuous" // Très important pour les codes-barres
            };

            html5QrCode.start({ facingMode: faceMode }, { ...config, videoConstraints }, onScanSuccess)
            .catch(() => {
                // Repli si le mode environment strict échoue
                html5QrCode.start(faceMode, config, onScanSuccess);
            });
        }

        function switchCamera() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
            launch(currentFacingMode);
        }

        function toggleTorch() {
            isTorchOn = !isTorchOn;
            html5QrCode.applyVideoConstraints({ advanced: [{ torch: isTorchOn }] })
            .catch(() => alert("Le flash nécessite la caméra arrière sur iOS"));
        }

        window.addEventListener('load', () => launch("environment"));
    </script>
</body>
</html>
