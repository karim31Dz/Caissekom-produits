<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner le Produit </title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #00FF41; /* Vert Flash */
            --text: #FFFFFF;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; overflow: hidden;
        }

        /* Scanner : Prend la moitié haute de l'écran */
        #reader {
            width: 100%;
            height: 50vh;
            background: #000;
        }

        /* Zone de résultat : Prend la moitié basse */
        .result-panel {
            height: 50vh;
            background: var(--card);
            border-top: 1px solid #333;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .label {
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .designation {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #FFF;
            height: 2rem;
            overflow: hidden;
        }

        .prix-container {
            display: inline-block;
            padding: 15px 30px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            background: rgba(0, 255, 65, 0.05);
        }

        .prix-valeur {
            font-size: 4rem;
            font-weight: 900;
            color: var(--accent);
        }

        .devise {
            font-size: 1.2rem;
            color: var(--accent);
            margin-left: 5px;
        }

        /* Indicateur de scan en cours */
        .scan-line {
            position: absolute;
            top: 25vh;
            left: 10%;
            width: 80%;
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            box-shadow: 0 0 10px var(--accent);
            z-index: 10;
            animation: moveLine 2s infinite ease-in-out;
        }

        @keyframes moveLine {
            0%, 100% { transform: translateY(-60px); }
            50% { transform: translateY(60px); }
        }
    </style>
</head>
<body>

    <div class="scan-line"></div>
    <div id="reader"></div>

    <div class="result-panel">
        <div class="label">Article détecté</div>
        <div id="res-nom" class="designation">PRÊT AU SCAN...</div>

        <div class="prix-container">
            <span id="res-prix" class="prix-valeur">0.00</span>
            <span class="devise">DA</span>
        </div>
        
        <div id="res-info" style="margin-top:20px; font-size:0.8rem; color:#444;">V1.0 - COMPUTIME</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let dernierCode = "";
        let tempsDernierScan = 0;

        // 1. Chargement du JSON (Base de données locale)
        fetch('produits.json')
            .then(res => res.json())
            .then(data => { 
                catalogue = data.produits;
                console.log("Catalogue chargé : " + catalogue.length + " produits");
            })
            .catch(() => { document.getElementById('res-nom').innerText = "ERREUR JSON !"; });

        function onScanSuccess(decodedText) {
            const maintenant = Date.now();
            
            // Éviter les scans multiples (Délai de 2.5 secondes entre deux scans identiques)
            if (decodedText === dernierCode && (maintenant - tempsDernierScan) < 2500) return;

            dernierCode = decodedText;
            tempsDernierScan = maintenant;

            // Feedback immédiat (Bip + Vibration iPhone)
            document.getElementById('audioBip').play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate(60);

            // Recherche dans le catalogue
            const p = catalogue.find(item => item.codebarre === decodedText);
            
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
                document.getElementById('res-info').innerText = "CODE : " + decodedText;
            } else {
                document.getElementById('res-nom').innerText = "NON RÉFÉRENCÉ";
                document.getElementById('res-prix').innerText = "---";
                document.getElementById('res-info').innerText = "INCONNU : " + decodedText;
            }
        }

        // 2. CONFIGURATION SCANNER TURBO
        const html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 30, // Fluidité maximale
            qrbox: { width: 300, height: 120 }, // Fente horizontale optimisée
            aspectRatio: 1.0,
            experimentalFeatures: {
                useBarCodeDetectorIfSupported: true // Accélération matérielle iOS/Android
            }
        };

        // 3. LANCEMENT CAMÉRA ARRIÈRE HD
        html5QrCode.start(
            { facingMode: { exact: "environment" } }, 
            {
                ...config,
                videoConstraints: {
                    width: { min: 1280, ideal: 1920 }, // Haute résolution pour les petits codes
                    height: { min: 720, ideal: 1080 },
                    focusMode: "continuous"
                }
            }, 
            onScanSuccess
        ).catch(() => {
            // Repli si le mode "exact" est refusé
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        });
    </script>
</body>
</html>
