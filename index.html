<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom - Scanner Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #00FF41; /* Vert Néon Matrix */
            --text: #FFFFFF;
            --error: #FF3D00;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Empêche le défilement inutile */
        }

        /* Zone Caméra */
        #reader {
            width: 100%;
            height: 60vh; /* Prend 60% de l'écran */
            background: #000;
        }

        /* Conteneur d'informations */
        .result-container {
            height: 40vh;
            background: var(--card);
            border-top: 2px solid var(--accent);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .label {
            color: #888;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .designation {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 15px;
            min-height: 1.6rem;
            color: #E0E0E0;
        }

        .prix-box {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .prix-valeur {
            font-size: 4.5rem;
            font-weight: 900;
            color: var(--accent);
            line-height: 1;
        }

        .devise {
            font-size: 1.5rem;
            color: var(--accent);
        }

        .status-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="status-bar" id="status">SYSTÈME PRÊT</div>

    <div id="reader"></div>

    <div class="result-container">
        <div class="label">Article</div>
        <div id="res-nom" class="designation">Scannez un produit...</div>

        <div class="label">Prix de Vente</div>
        <div class="prix-box">
            <span id="res-prix" class="prix-valeur">0.00</span>
            <span class="devise">DA</span>
        </div>
        
        <div id="res-code" style="margin-top:15px; font-size:0.7rem; color:#444;">ID: --</div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com/buttons/beep-07a.mp3"></audio>

    <script>
        let catalogue = [];
        let dernierCode = "";
        let tempsDernierScan = 0;

        // 1. CHARGEMENT DU CATALOGUE JSON (Produits envoyés par WinDev)
        fetch('produits.json')
            .then(response => response.json())
            .then(data => {
                catalogue = data.produits;
                document.getElementById('status').innerText = "BASE DE DONNÉES OK (" + catalogue.length + " RÉF)";
            })
            .catch(err => {
                document.getElementById('status').style.color = "red";
                document.getElementById('status').innerText = "ERREUR CHARGEMENT JSON";
            });

        // 2. FONCTION DE TRAITEMENT DU SCAN
        function onScanSuccess(decodedText, decodedResult) {
            const maintenant = Date.now();
            
            // Empêche le scan multiple du même produit (attente 2 secondes)
            if (decodedText === dernierCode && (maintenant - tempsDernierScan) < 2000) {
                return;
            }

            dernierCode = decodedText;
            tempsDernierScan = maintenant;

            // Feedback : Son et Vibration
            document.getElementById('audioBip').play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate(80);

            // Recherche dans le catalogue
            const produit = catalogue.find(p => p.codebarre === decodedText);
            
            if (produit) {
                document.getElementById('res-nom').innerText = produit.designation;
                document.getElementById('res-prix').innerText = produit.prix;
                document.getElementById('res-code').innerText = "CODE: " + decodedText + " (" + decodedResult.result.format.formatName + ")";
            } else {
                document.getElementById('res-nom').innerText = "PRODUIT NON RÉFÉRENCÉ";
                document.getElementById('res-prix').innerText = "---";
                document.getElementById('res-code').innerText = "CODE SCANNE: " + decodedText;
            }
        }

        // 3. LANCEMENT DU SCANNER (FORCER CAMÉRA ARRIÈRE + CONTINU)
        const html5QrCode = new Html5Qrcode("reader");
        
        const config = { 
            fps: 25, 
            qrbox: { width: 320, height: 180 }, // Zone large pour codes-barres
            aspectRatio: 1.777778 // Format 16:9
        };

        // On force la caméra arrière ("environment")
        html5QrCode.start(
            { facingMode: { exact: "environment" } }, 
            config, 
            onScanSuccess
        ).catch(err => {
            // Si l'iPhone bloque le mode "exact", on tente le mode simple
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        });
    </script>
</body>
</html>
