<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaisseKom - Scanner</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --primary: #29318C; --accent: #E53139; --success: #28a745; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; overflow: hidden; }
        
        header { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #EEE; background: #FFF; }
        .logo { font-weight: 900; color: var(--primary); } .logo span { color: var(--accent); }

        /* ZONE CAMERA */
        #interactive.viewport { flex: 1; position: relative; background: #000; }
        #interactive.viewport > video { width: 100%; height: 100%; object-fit: cover; }
        canvas.drawingBuffer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .laser { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent); z-index: 10; animation: scan 1s infinite; }
        @keyframes scan { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* ZONE RESULTAT */
        .result-panel { background: #FFF; padding: 15px; border-top: 3px solid var(--primary); min-height: 200px; text-align: center; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .nom { font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; display: block; }
        
        .price-row { display: flex; justify-content: space-around; border-top: 1px solid #F0F0F0; padding-top: 15px; }
        .price-box { flex: 1; }
        .val { font-size: 2.2rem; font-weight: 900; display: block; }
        .unit { color: var(--primary); }
        .pack { color: var(--success); }
        .currency { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <header><div class="logo">CAISSE<span>KOM</span></div></header>

    <div id="interactive" class="viewport">
        <div class="laser"></div>
    </div>

    <div class="result-panel">
        <div class="label">Article</div>
        <span id="res-nom" class="nom">EN ATTENTE...</span>

        <div class="price-row">
            <div class="price-box">
                <div class="label">Unité</div>
                <span class="val unit"><span id="res-prix">0</span> <small class="currency">DA</small></span>
            </div>
            <div class="price-box" style="border-left: 1px solid #EEE;">
                <div class="label">Pack</div>
                <span class="val pack"><span id="res-prix-pack">---</span> <small class="currency">DA</small></span>
            </div>
        </div>
    </div>

    <audio id="audioBip" src="https://www.soundjay.com"></audio>

    <script>
        let catalogue = [];
        let dernierCode = "";
        let tempsDernierScan = 0;

        fetch('produits.json').then(r => r.json()).then(d => catalogue = d.produits).catch(e => console.log("Erreur JSON"));

        function startScanner() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: {
                        facingMode: "environment" // Force la caméra arrière
                    }
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader", "code_128_reader", "upc_reader"]
                }
            }, function(err) {
                if (err) {
                    alert("Erreur Caméra : " + err.name);
                    return;
                }
                Quagga.start();
            });
        }

        Quagga.onDetected(function(result) {
            let code = result.codeResult.code;
            if (code === dernierCode && (Date.now() - tempsDernierScan) < 2500) return;
            
            dernierCode = code;
            tempsDernierScan = Date.now();
            document.getElementById('audioBip').play().catch(()=>{});

            const p = catalogue.find(item => item.codebarre === code);
            if (p) {
                document.getElementById('res-nom').innerText = p.designation;
                document.getElementById('res-prix').innerText = p.prix;
                document.getElementById('res-prix-pack').innerText = p.prix_pack || "---";
            } else {
                document.getElementById('res-nom').innerText = "INCONNU (" + code + ")";
                document.getElementById('res-prix').innerText = "---";
                document.getElementById('res-prix-pack').innerText = "---";
            }
        });

        // Lancement au chargement
        window.onload = startScanner;
    </script>
</body>
</html>
